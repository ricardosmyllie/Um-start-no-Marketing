    let currentNode = "start";
    
    const storyText = document.getElementById("story-text");
    const optionsContainer = document.getElementById("options-container");
    const confirmBtn = document.getElementById("confirm-btn");
    const errorMsg = document.getElementById("error-msg");
    const gameTitle = document.getElementById("game-title");

    function renderNode(nodeId) {
        const node = storyData[nodeId];
        errorMsg.style.display = "none";
        optionsContainer.innerHTML = "";
        
        if (node.isEnding) {
            gameTitle.innerText = "Decisão Final";
            storyText.innerHTML = `<div class="ending-title">${node.title}</div>${node.text}`;
            confirmBtn.innerText = "JOGAR NOVAMENTE";
            confirmBtn.onclick = () => {
                currentNode = "start";
                gameTitle.innerText = "Dilemas e Decisões: O Império Gráfico";
                confirmBtn.innerText = "CONFIRMA";
                renderNode(currentNode);
            };
        } else {
            storyText.innerText = node.text;
            
            const wrapper1 = document.createElement("div");
            wrapper1.className = "option-wrapper";
            wrapper1.innerHTML = `
                <input type="radio" name="choice" id="opt1" value="${node.opt1.next}">
                <label class="option-label" for="opt1">A) ${node.opt1.text}</label>
            `;
            
            const wrapper2 = document.createElement("div");
            wrapper2.className = "option-wrapper";
            wrapper2.innerHTML = `
                <input type="radio" name="choice" id="opt2" value="${node.opt2.next}">
                <label class="option-label" for="opt2">B) ${node.opt2.text}</label>
            `;
            
            optionsContainer.appendChild(wrapper1);
            optionsContainer.appendChild(wrapper2);
            
            confirmBtn.onclick = () => {
                const selectedOption = document.querySelector('input[name="choice"]:checked');
                if (selectedOption) {
                    currentNode = selectedOption.value;
                    renderNode(currentNode);
                } else {
                    errorMsg.style.display = "block";
                }
            };
        }
    }

    function iniciarJogo() {
        const checkExist = setInterval(function() {
            if (document.getElementById("story-text")) {
                renderNode(currentNode);
                clearInterval(checkExist);
            }
        }, 100); 
    }

    iniciarJogo();

</script>
